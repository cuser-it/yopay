name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout source
        uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: curl, mbstring, openssl, pdo_sqlite, sqlite3
          coverage: none
          tools: composer:v2

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: pnpm

      - name: Install PHP dependencies
        run: composer install --prefer-dist --no-interaction --no-progress

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Build frontend
        run: pnpm run build

      - name: Run frontend tests
        run: pnpm run test:frontend

      - name: Run application tests
        shell: bash
        run: |
          set +e
          php artisan test --colors=never --log-junit application-tests.xml 2>&1 | tee application-tests.log
          test_status=${PIPESTATUS[0]}
          set -e

          if [ "$test_status" -ne 0 ]; then
            {
              echo '## Application test failure'
              echo
              echo '```text'
              tail -n 120 application-tests.log
              echo '```'
            } >> "$GITHUB_STEP_SUMMARY"

            python3 <<'PY'
          import os
          import xml.etree.ElementTree as ElementTree

          report = ElementTree.parse('application-tests.xml')

          for test_case in report.iter('testcase'):
              failure = test_case.find('failure')
              error = test_case.find('error')
              problem = failure if failure is not None else error

              if problem is None:
                  continue

              test_name = test_case.attrib.get('name', 'Unknown test')
              class_name = test_case.attrib.get('class', 'Application tests')
              details = '\n'.join(
                  part for part in [
                      problem.attrib.get('message', ''),
                      problem.text or '',
                  ] if part
              )
              details = details[-7000:]
              details = details.replace('%', '%25').replace('\r', '%0D').replace('\n', '%0A')
              title = f'{class_name}::{test_name}'.replace('%', '%25').replace('\r', '').replace('\n', '')
              print(f'::error title={title}::{details}')
          PY
          fi

          exit "$test_status"
