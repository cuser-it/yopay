name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout source
        uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: curl, mbstring, openssl, pdo_sqlite, sqlite3
          coverage: none
          tools: composer:v2

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: pnpm

      - name: Install PHP dependencies
        run: composer install --prefer-dist --no-interaction --no-progress

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Build frontend
        run: pnpm run build

      - name: Run frontend tests
        run: pnpm run test:frontend

      - name: Run application tests
        shell: bash
        run: |
          set +e
          php artisan test 2>&1 | tee application-tests.log
          test_status=${PIPESTATUS[0]}
          set -e

          if [ "$test_status" -ne 0 ]; then
            {
              echo '## Application test failure'
              echo
              echo '```text'
              tail -n 120 application-tests.log
              echo '```'
            } >> "$GITHUB_STEP_SUMMARY"

            test_output=$(tail -n 80 application-tests.log)
            test_output=${test_output//'%'/'%25'}
            test_output=${test_output//$'\r'/'%0D'}
            test_output=${test_output//$'\n'/'%0A'}
            echo "::error title=Application tests failed::$test_output"
          fi

          exit "$test_status"
