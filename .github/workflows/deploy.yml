name: Deploy Production

on:
  workflow_run:
    workflows:
      - CI
    types:
      - completed
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: production
  cancel-in-progress: false

jobs:
  deploy:
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    environment: production

    env:
      DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
      DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
      DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
      DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
      PHP_CONTAINER: ${{ secrets.PHP_CONTAINER }}
      PHP_CONTAINER_PATH: ${{ secrets.PHP_CONTAINER_PATH }}

    steps:
      - name: Resolve deployment revision
        id: revision
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_run" ]]; then
            echo "sha=${{ github.event.workflow_run.head_sha }}" >> "$GITHUB_OUTPUT"
          else
            echo "sha=${{ github.sha }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout verified source
        uses: actions/checkout@v6
        with:
          ref: ${{ steps.revision.outputs.sha }}

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: curl, mbstring, openssl, pdo_mysql
          coverage: none
          tools: composer:v2

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: pnpm

      - name: Build production package
        run: |
          composer install --no-dev --prefer-dist --no-interaction --no-progress --optimize-autoloader
          pnpm install --frozen-lockfile
          pnpm run build
          bash scripts/build-release.sh

      - name: Configure SSH
        env:
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          DEPLOY_KNOWN_HOSTS: ${{ secrets.DEPLOY_KNOWN_HOSTS }}
        run: |
          : "${DEPLOY_SSH_KEY:?DEPLOY_SSH_KEY is required}"
          : "${DEPLOY_KNOWN_HOSTS:?DEPLOY_KNOWN_HOSTS is required}"
          install -m 700 -d "$HOME/.ssh"
          printf '%s\n' "$DEPLOY_SSH_KEY" > "$HOME/.ssh/id_ed25519"
          printf '%s\n' "$DEPLOY_KNOWN_HOSTS" > "$HOME/.ssh/known_hosts"
          chmod 600 "$HOME/.ssh/id_ed25519" "$HOME/.ssh/known_hosts"

      - name: Upload release
        run: |
          : "${DEPLOY_HOST:?DEPLOY_HOST is required}"
          : "${DEPLOY_PORT:?DEPLOY_PORT is required}"
          : "${DEPLOY_USER:?DEPLOY_USER is required}"
          : "${DEPLOY_PATH:?DEPLOY_PATH is required}"
          rsync -az --delete \
            --exclude='.env' \
            --exclude='storage/' \
            --exclude='bootstrap/cache/' \
            --exclude='public/storage' \
            -e "ssh -p $DEPLOY_PORT" \
            dist/yopay/ "$DEPLOY_USER@$DEPLOY_HOST:$DEPLOY_PATH/"

      - name: Run safe database and cache updates
        run: |
          : "${PHP_CONTAINER:?PHP_CONTAINER is required}"
          : "${PHP_CONTAINER_PATH:?PHP_CONTAINER_PATH is required}"
          ssh -p "$DEPLOY_PORT" "$DEPLOY_USER@$DEPLOY_HOST" \
            bash -s -- "$DEPLOY_PATH" "$PHP_CONTAINER" "$PHP_CONTAINER_PATH" <<'REMOTE'
          set -euo pipefail

          deploy_path="$1"
          php_container="$2"
          php_container_path="$3"

          chmod 755 "$deploy_path"
          docker exec "$php_container" /bin/bash -lc "
            set -e
            cd '$php_container_path'
            chown -R www-data:www-data storage bootstrap/cache
            chmod -R ug+rwX storage bootstrap/cache
            php artisan migrate --force
            php artisan config:clear
            php artisan route:clear
            php artisan view:clear
            php artisan queue:restart
          "
          REMOTE

      - name: Verify health endpoint
        if: vars.DEPLOY_HEALTHCHECK_URL != ''
        env:
          DEPLOY_HEALTHCHECK_URL: ${{ vars.DEPLOY_HEALTHCHECK_URL }}
        run: curl --fail --silent --show-error --retry 5 --retry-delay 3 "$DEPLOY_HEALTHCHECK_URL"
